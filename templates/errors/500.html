{% extends "base.html" %}

{% block title %}Server Error - DigiServe{% endblock %}

{% block content %}
<div class="text-center py-5">
    <i class="fas fa-exclamation-triangle fa-5x text-danger mb-4"></i>
    <h1 class="display-1 fw-bold text-danger">500</h1>
    <h2 class="mb-3">Something Went Wrong</h2>
    <p class="text-muted mb-4">We're sorry, but something went wrong on our end. Please try again later.</p>
    <div class="d-flex justify-content-center gap-3 flex-wrap">
        <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4">
            <i class="fas fa-home me-2"></i> Go Home
        </a>
        <button class="btn btn-outline-secondary rounded-pill px-4" onclick="location.reload()">
            <i class="fas fa-sync-alt me-2"></i> Try Again
        </button>
    </div>
    {% if error_message %}
        <div class="alert alert-danger mt-4 text-start small">
            <strong>Error Details:</strong> {{ error_message }}
        </div>
    {% endif %}
</div>
{% endblock %}
