{% extends "base.html" %}

{% block title %}My Applications - DigiServe {% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4" data-aos="fade-up">
    <h2 class="fw-bold"><i class="fas fa-history text-primary me-2"></i> My Applications</h2>
    <a href="{{ url_for('services_dashboard') }}" class="btn btn-primary rounded-pill px-4">
        <i class="fas fa-plus me-2"></i> New Application
    </a>
</div>

<!-- Filters -->
<div class="card shadow-sm rounded-4 mb-4" data-aos="fade-up" data-aos-delay="100">
    <div class="card-body p-3">
        <div class="row g-2 align-items-center">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text bg-transparent"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="Search by reference or service...">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="statusFilter">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="paymentFilter">
                    <option value="all">All Payments</option>
                    <option value="pending">Pending Payment</option>
                    <option value="completed">Payment Completed</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary w-100" onclick="resetFilters()">
                    <i class="fas fa-undo-alt me-1"></i> Reset
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Applications Table -->
<div class="card shadow-sm rounded-4" data-aos="fade-up" data-aos-delay="200">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0" id="requestsTable">
                <thead class="table-light">
                    <tr>
                        <th>Reference No.</th>
                        <th>Service</th>
                        <th>Status</th>
                        <th>Payment</th>
                        <th>Amount</th>
                        <th>Documents</th>
                        <th>Submitted Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="requestsTableBody">
                    <tr>
                        <td colspan="8" class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-3 text-muted">Loading your applications...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Pagination -->
<div class="d-flex justify-content-between align-items-center mt-4" id="paginationContainer" style="display: none;">
    <div class="text-muted small" id="paginationInfo"></div>
    <nav>
        <ul class="pagination mb-0" id="pagination"></ul>
    </nav>
</div>

<style>
.status-badge {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
}

.status-pending { background-color: #ffc107; color: #000; }
.status-in_progress { background-color: #17a2b8; color: #fff; }
.status-completed { background-color: #28a745; color: #fff; }
.status-rejected { background-color: #dc3545; color: #fff; }

.payment-pending { background-color: #ffc107; color: #000; }
.payment-completed { background-color: #28a745; color: #fff; }

.timeline {
    position: relative;
    padding: 20px 0;
}

.timeline-item {
    position: relative;
    padding-left: 45px;
    margin-bottom: 25px;
}

.timeline-icon {
    position: absolute;
    left: 0;
    top: 0;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    z-index: 2;
}

.timeline-icon.completed {
    background-color: #28a745;
    color: white;
}

.timeline-icon.current {
    background-color: #667eea;
    color: white;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.timeline-content {
    background: var(--bg-secondary);
    padding: 12px 16px;
    border-radius: 10px;
    border-left: 3px solid #667eea;
}

.timeline:before {
    content: '';
    position: absolute;
    left: 17px;
    top: 10px;
    bottom: 10px;
    width: 2px;
    background: var(--border-color);
}

.details-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.detail-item {
    background: var(--bg-secondary);
    padding: 10px 15px;
    border-radius: 8px;
}

.detail-label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 5px;
}

.detail-value {
    font-size: 14px;
    font-weight: 500;
}
</style>

<script>
let currentPage = 1;
let totalPages = 1;
let currentFilters = { status: 'all', payment: 'all', search: '' };

async function loadRequests() {
    const tbody = document.getElementById('requestsTableBody');
    if (!tbody) return;
    
    tbody.innerHTML = `
        <tr>
            <td colspan="8" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Loading your applications...</p>
            </td>
        </tr>
    `;
    
    try {
        const params = new URLSearchParams({
            page: currentPage,
            per_page: 10,
            status: currentFilters.status,
            payment: currentFilters.payment,
            search: currentFilters.search
        });
        
        const response = await fetch(`/api/my-requests?${params}`);
        const data = await response.json();
        
        if (data.error) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center py-5 text-danger">
                        <i class="fas fa-exclamation-circle fa-3x mb-3"></i>
                        <p>${data.error}</p>
                        <button class="btn btn-primary btn-sm rounded-pill" onclick="loadRequests()">Try Again</button>
                    </td>
                </tr>
            `;
            return;
        }
        
        if (!data.requests || data.requests.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center py-5">
                        <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                        <p>No applications found.</p>
                        <a href="{{ url_for('services_dashboard') }}" class="btn btn-primary rounded-pill">
                            <i class="fas fa-plus me-2"></i> Apply for Service
                        </a>
                    </td>
                </tr>
            `;
            document.getElementById('paginationContainer').style.display = 'none';
            return;
        }
        
        totalPages = data.total_pages;
        updatePagination();
        
        tbody.innerHTML = '';
        for (const req of data.requests) {
            const statusClass = `status-${req.status}`;
            const paymentClass = `payment-${req.payment_status}`;
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><code class="fw-bold">${escapeHtml(req.reference)}</code></td>
                <td>${escapeHtml(req.service_name)}</td>
                <td><span class="badge ${statusClass}">${req.status.toUpperCase()}</span></td>
                <td><span class="badge ${paymentClass}">${req.payment_status.toUpperCase()}</span></td>
                <td>₹${parseFloat(req.amount).toFixed(2)}</td>
                <td><span class="badge bg-info">${req.documents_count} files</span></td>
                <td><small>${escapeHtml(req.submitted_at)}</small></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary rounded-pill" onclick="viewRequestDetails('${req.id}')">
                        <i class="fas fa-eye me-1"></i> View
                    </button>
                </td>
            `;
            tbody.appendChild(row);
        }
        
    } catch (error) {
        console.error('Error loading requests:', error);
        tbody.innerHTML = `
            <tr>
                <td colspan="8" class="text-center py-5 text-danger">
                    <i class="fas fa-exclamation-circle fa-3x mb-3"></i>
                    <p>Error loading applications. Please try again.</p>
                    <button class="btn btn-primary btn-sm rounded-pill" onclick="loadRequests()">Retry</button>
                </td>
            </tr>
        `;
    }
}

function updatePagination() {
    const container = document.getElementById('paginationContainer');
    const pagination = document.getElementById('pagination');
    const info = document.getElementById('paginationInfo');
    
    if (totalPages <= 1) {
        container.style.display = 'none';
        return;
    }
    
    container.style.display = 'flex';
    info.innerHTML = `Page ${currentPage} of ${totalPages}`;
    
    let paginationHtml = '';
    
    // Previous button
    paginationHtml += `
        <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;">&laquo;</a>
        </li>
    `;
    
    // Page numbers
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, currentPage + 2);
    
    for (let i = startPage; i <= endPage; i++) {
        paginationHtml += `
            <li class="page-item ${i === currentPage ? 'active' : ''}">
                <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
            </li>
        `;
    }
    
    // Next button
    paginationHtml += `
        <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;">&raquo;</a>
        </li>
    `;
    
    pagination.innerHTML = paginationHtml;
}

function changePage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    loadRequests();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyFilters() {
    currentFilters = {
        status: document.getElementById('statusFilter').value,
        payment: document.getElementById('paymentFilter').value,
        search: document.getElementById('searchInput').value
    };
    currentPage = 1;
    loadRequests();
}

function resetFilters() {
    document.getElementById('statusFilter').value = 'all';
    document.getElementById('paymentFilter').value = 'all';
    document.getElementById('searchInput').value = '';
    applyFilters();
}

// Event listeners
document.getElementById('statusFilter')?.addEventListener('change', applyFilters);
document.getElementById('paymentFilter')?.addEventListener('change', applyFilters);
document.getElementById('searchInput')?.addEventListener('keyup', function(e) {
    if (e.key === 'Enter') applyFilters();
});

async function viewRequestDetails(requestId) {
    try {
        const response = await fetch(`/request-details/${requestId}`);
        const data = await response.json();
        
        if (data.error) {
            alert(data.error);
            return;
        }
        
        const request = data.request;
        const documents = data.documents || [];
        
        const statusMap = {
            'pending': 'warning',
            'in_progress': 'info',
            'completed': 'success',
            'rejected': 'danger'
        };
        const statusColor = statusMap[request.status] || 'secondary';
        
        // Build timeline HTML
        let timelineHtml = '';
        if (request.timeline && request.timeline.length > 0) {
            timelineHtml = '<div class="timeline">';
            request.timeline.forEach((item, idx) => {
                const isCurrent = idx === request.timeline.length - 1 && request.status !== 'completed';
                timelineHtml += `
                    <div class="timeline-item">
                        <div class="timeline-icon ${item.completed ? 'completed' : (isCurrent ? 'current' : 'pending')}">
                            <i class="fas ${item.completed ? 'fa-check' : (isCurrent ? 'fa-spinner fa-pulse' : 'fa-clock')}"></i>
                        </div>
                        <div class="timeline-content">
                            <h6 class="mb-1">${escapeHtml(item.title)}</h6>
                            <p class="small mb-1">${escapeHtml(item.description)}</p>
                            <small class="text-muted">${escapeHtml(item.timestamp)}</small>
                        </div>
                    </div>
                `;
            });
            timelineHtml += '</div>';
        }
        
        // Build details HTML
        let detailsHtml = '';
        
        if (request.applicant_name || request.applicant_dob) {
            detailsHtml += `
                <div class="application-details-card mb-3">
                    <h6 class="fw-bold mb-3"><i class="fas fa-user-circle me-2"></i> Applicant Information</h6>
                    <div class="details-grid">
                        <div class="detail-item"><div class="detail-label">Full Name</div><div class="detail-value">${escapeHtml(request.applicant_name || 'N/A')}</div></div>
                        <div class="detail-item"><div class="detail-label">Date of Birth</div><div class="detail-value">${escapeHtml(request.applicant_dob || 'N/A')}</div></div>
                        <div class="detail-item"><div class="detail-label">Gender</div><div class="detail-value">${escapeHtml((request.applicant_gender || 'N/A').toUpperCase())}</div></div>
                        <div class="detail-item"><div class="detail-label">Category</div><div class="detail-value">${escapeHtml((request.applicant_category || 'N/A').toUpperCase())}</div></div>
                        <div class="detail-item"><div class="detail-label">Email</div><div class="detail-value">${escapeHtml(request.applicant_email || 'N/A')}</div></div>
                    </div>
                </div>
            `;
        }
        
        if (request.applicant_address) {
            detailsHtml += `
                <div class="application-details-card mb-3">
                    <h6 class="fw-bold mb-3"><i class="fas fa-map-marker-alt me-2"></i> Address Information</h6>
                    <div class="details-grid">
                        <div class="detail-item"><div class="detail-label">Address</div><div class="detail-value">${escapeHtml(request.applicant_address)}</div></div>
                        <div class="detail-item"><div class="detail-label">City</div><div class="detail-value">${escapeHtml(request.applicant_city || 'N/A')}</div></div>
                        <div class="detail-item"><div class="detail-label">State</div><div class="detail-value">${escapeHtml(request.applicant_state || 'N/A')}</div></div>
                        <div class="detail-item"><div class="detail-label">Pincode</div><div class="detail-value">${escapeHtml(request.applicant_pincode || 'N/A')}</div></div>
                    </div>
                </div>
            `;
        }
        
        if (request.qualification || request.institute_name) {
            detailsHtml += `
                <div class="application-details-card mb-3">
                    <h6 class="fw-bold mb-3"><i class="fas fa-graduation-cap me-2"></i> Educational Information</h6>
                    <div class="details-grid">
                        <div class="detail-item"><div class="detail-label">Qualification</div><div class="detail-value">${escapeHtml(request.qualification || 'N/A')}</div></div>
                        <div class="detail-item"><div class="detail-label">Institute</div><div class="detail-value">${escapeHtml(request.institute_name || 'N/A')}</div></div>
                        <div class="detail-item"><div class="detail-label">Course</div><div class="detail-value">${escapeHtml(request.course_name || 'N/A')}</div></div>
                        <div class="detail-item"><div class="detail-label">Passing Year</div><div class="detail-value">${escapeHtml(request.passing_year || 'N/A')}</div></div>
                        <div class="detail-item"><div class="detail-label">Percentage</div><div class="detail-value">${escapeHtml(request.percentage || 'N/A')}</div></div>
                    </div>
                </div>
            `;
        }
        
        // Documents HTML
        let documentsHtml = '<div class="application-details-card"><h6 class="fw-bold mb-3"><i class="fas fa-paperclip me-2"></i> Uploaded Documents</h6>';
        if (documents.length > 0) {
            documentsHtml += '<div class="details-grid">';
            documents.forEach(doc => {
                documentsHtml += `
                    <div class="detail-item">
                        <div class="detail-label">${escapeHtml(doc.original_filename)}</div>
                        <div class="detail-value small">
                            <i class="far fa-calendar-alt"></i> ${escapeHtml(doc.uploaded_at)}<br>
                            <i class="fas fa-database"></i> ${(doc.file_size/1024).toFixed(2)} KB
                        </div>
                    </div>
                `;
            });
            documentsHtml += '</div>';
        } else {
            documentsHtml += '<p class="text-muted">No documents uploaded</p>';
        }
        documentsHtml += '</div>';
        
        const modalHtml = `
            <div class="modal fade" id="requestDetailsModal" tabindex="-1">
                <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
                    <div class="modal-content rounded-4">
                        <div class="modal-header bg-primary text-white rounded-top-4 border-0">
                            <h5 class="modal-title"><i class="fas fa-file-alt me-2"></i> Application Details</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body p-4">
                            <div class="application-details-card mb-3">
                                <h6 class="fw-bold mb-3"><i class="fas fa-info-circle me-2"></i> Application Overview</h6>
                                <div class="details-grid">
                                    <div class="detail-item"><div class="detail-label">Reference</div><div class="detail-value"><code>${escapeHtml(request.reference_number)}</code></div></div>
                                    <div class="detail-item"><div class="detail-label">Service</div><div class="detail-value">${escapeHtml(request.service_name)}</div></div>
                                    <div class="detail-item"><div class="detail-label">Status</div><div class="detail-value"><span class="badge bg-${statusColor}">${request.status.toUpperCase()}</span></div></div>
                                    <div class="detail-item"><div class="detail-label">Payment</div><div class="detail-value"><span class="badge bg-${request.payment_status === 'completed' ? 'success' : 'warning'}">${request.payment_status.toUpperCase()}</span></div></div>
                                    <div class="detail-item"><div class="detail-label">Amount</div><div class="detail-value">₹${parseFloat(request.amount).toFixed(2)}</div></div>
                                    <div class="detail-item"><div class="detail-label">Submitted</div><div class="detail-value">${escapeHtml(request.submitted_at)}</div></div>
                                    ${request.processed_at ? `<div class="detail-item"><div class="detail-label">Processed</div><div class="detail-value">${escapeHtml(request.processed_at)}</div></div>` : ''}
                                </div>
                            </div>
                            ${detailsHtml}
                            ${timelineHtml}
                            ${documentsHtml}
                            ${request.admin_remarks ? `<div class="alert alert-info rounded-3"><i class="fas fa-comment-dots me-2"></i> <strong>Admin Remarks:</strong><br>${escapeHtml(request.admin_remarks)}</div>` : ''}
                        </div>
                        <div class="modal-footer border-0">
                            <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Close</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        const existingModal = document.getElementById('requestDetailsModal');
        if (existingModal) existingModal.remove();
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = new bootstrap.Modal(document.getElementById('requestDetailsModal'));
        modal.show();
        
        document.getElementById('requestDetailsModal').addEventListener('hidden.bs.modal', function() {
            this.remove();
        });
        
    } catch (error) {
        console.error('Error fetching request details:', error);
        alert('Error loading application details. Please try again.');
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Load requests on page load
document.addEventListener('DOMContentLoaded', loadRequests);
</script>
{% endblock %}
